# docker-compose.yml
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./gluetun:/gluetun
      - ./setup-gluetun.sh:/setup-gluetun.sh
      - ./gluetun-entrypoint.sh:/gluetun-entrypoint.sh
      - ./healthcheck.sh:/healthcheck.sh
    entrypoint: /gluetun-entrypoint.sh
    environment:
      # --- Add your Gluetun variables below ---
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      # --- Critical firewall settings for acting as a gateway ---
      - FIREWALL_OUTBOUND_SUBNETS=172.28.0.0/24,100.64.0.0/10
      # Disable Gluetun's built-in firewall to allow manual configuration.
      # Fail-closed is enforced manually in setup-gluetun.sh (FORWARD ... DROP).
      - FIREWALL=off
      # Control server (used by the health check and the country switcher).
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      vpn-net:
        ipv4_address: 172.28.0.2 # Static IP for Gluetun
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.rp_filter=0
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./tailscale:/var/lib/tailscale
      - ./start-tailscale.sh:/start-tailscale.sh
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_EXTRA_ARGS=--advertise-exit-node
    entrypoint: /start-tailscale.sh
    networks:
      vpn-net:
        ipv4_address: 172.28.0.3 # Static IP for Tailscale
    restart: unless-stopped
    depends_on:
      - gluetun

  # Web UI to switch VPN exit country, exposed over the tailnet via
  # `tailscale serve` (see start-tailscale.sh). Recreates gluetun via the
  # mounted docker socket. COMPOSE_PROJECT_NAME must match the stack's project
  # name (the directory name you run docker-compose from).
  switcher:
    build: ./switcher
    container_name: vpn-switcher
    environment:
      - ENV_FILE=/project/.env
      - COMPOSE_FILE=/project/docker-compose.yml
      - COMPOSE_PROJECT_NAME=vpn-ts
      - GLUETUN_URL=http://172.28.0.2:8000
      - LISTEN=:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project
    networks:
      vpn-net:
        ipv4_address: 172.28.0.4 # Static IP for the switcher (referenced by tailscale serve)
    restart: unless-stopped
    depends_on:
      - gluetun

networks:
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24